# アプリ名
spring.application.name=communityboard

# ──────────────────────────────────────────
#  データベース接続（Docker MySQL）
# ──────────────────────────────────────────
# 文字化け対策のため characterEncoding, useUnicode, forceEncoding を追加しました
spring.datasource.url=jdbc:mysql://localhost:3306/communityboard?useSSL=false&serverTimezone=Asia/Tokyo&allowPublicKeyRetrieval=true&characterEncoding=UTF-8&useUnicode=true&connectionCollation=utf8mb4_general_ci
spring.datasource.username=cbuser
spring.datasource.password=cbpass
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ──────────────────────────────────────────
#  JPA / Hibernate
# ──────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ──────────────────────────────────────────
#  静的リソースの設定
# ──────────────────────────────────────────
spring.web.resources.static-locations=classpath:/static/
spring.mvc.static-path-pattern=/**

# 開発中はキャッシュを完全にオフにして即時反映
spring.thymeleaf.cache=false
spring.web.resources.cache.period=0

# ──────────────────────────────────────────
#  Thymeleaf / 文字化け対策
# ──────────────────────────────────────────
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.mode=HTML

# サーバー側での文字コード強制設定（決定版）
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
server.servlet.encoding.force-response=true

# ──────────────────────────────────────────
#  ログ設定
# ──────────────────────────────────────────
logging.level.com.example.communityboard=DEBUG
logging.level.org.springframework.security=DEBUG