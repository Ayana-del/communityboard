<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<body>
    <th:block th:replace="~{layout/default :: layout('新規登録', ~{::content})}">
        <th:block th:fragment="content">
            <section class="form-page auth-page">
                <div class="form-container">
                    <div class="form-header">
                        <h2 class="page-title">👤 新規登録</h2>
                        <p class="form-description">地域のコミュニティに参加するためのアカウントを作成します。</p>
                    </div>

                    <div th:if="${errorMessage}" class="error-message error-box" th:text="${errorMessage}">エラー</div>

                    <form th:action="@{/register}" method="post" th:object="${registerForm}" class="app-form">
                        <div class="form-group">
                            <label for="name" class="form-label">名前 <span class="required">※</span></label>
                            <input type="text" id="name" th:field="*{name}" class="form-control"
                                th:classappend="${#fields.hasErrors('name')} ? ' is-error' : ''" placeholder="例：山田 太郎">
                            <p th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="error-message">エラー</p>
                        </div>

                        <div class="form-group">
                            <label for="email" class="form-label">メールアドレス <span class="required">※</span></label>
                            <input type="email" id="email" th:field="*{email}" class="form-control"
                                th:classappend="${#fields.hasErrors('email')} ? ' is-error' : ''"
                                placeholder="例：taro@example.com">
                            <p th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="error-message">エラー</p>
                        </div>

                        <div class="form-group">
                            <label for="password" class="form-label">パスワード <span class="required">※</span></label>
                            <input type="password" id="password" th:field="*{password}" class="form-control"
                                th:classappend="${#fields.hasErrors('password')} ? ' is-error' : ''"
                                placeholder="8文字以上で入力してください">
                            <p th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="error-message">
                                エラー</p>
                        </div>

                        <div class="form-group">
                            <label for="passwordConfirm" class="form-label">パスワード（確認） <span
                                    class="required">※</span></label>
                            <input type="password" id="passwordConfirm" th:field="*{passwordConfirm}"
                                class="form-control"
                                th:classappend="${#fields.hasErrors('passwordConfirm')} ? ' is-error' : ''"
                                placeholder="もう一度入力してください">
                            <p th:if="${#fields.hasErrors('passwordConfirm')}" th:errors="*{passwordConfirm}"
                                class="error-message">エラー</p>
                        </div>

                        <div class="form-actions">
                            <button type="submit" class="btn btn-primary">登録する</button>
                        </div>
                    </form>

                    <div class="form-footer">
                        <p>すでにアカウントをお持ちの方は<a th:href="@{/login}">ログイン</a></p>
                    </div>
                </div>
            </section>
        </th:block>
    </th:block>
</body>

</html>
