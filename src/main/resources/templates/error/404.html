<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<body>
    <th:block th:replace="~{layout/default :: layout('ページが見つかりません', ~{::content})}">
        <th:block th:fragment="content">
            <section class="error-page">
                <div class="error-code">404</div>
                <h2 class="error-title">ページが見つかりません</h2>
                <p class="error-description">お探しのページは存在しないか、削除された可能性があります。</p>
                <a th:href="@{/posts}" class="btn btn-primary">トップページに戻る</a>
            </section>
        </th:block>
    </th:block>
</body>

</html>
