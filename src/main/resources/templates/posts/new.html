<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<body>
    <th:block th:replace="~{layout/default :: layout('新規投稿', ~{::content})}">
        <th:block th:fragment="content">
            <section class="form-page">
                <div class="form-container">
                    <div class="form-header">
                        <h2 class="page-title">✏️ 新規投稿</h2>
                        <p class="form-description">地域の皆さんに共有したい内容を投稿できます。</p>
                    </div>

                    <form th:action="@{/posts}" method="post" th:object="${postForm}" class="app-form">
                        <div class="form-group">
                            <label for="title" class="form-label">タイトル <span class="required">※</span></label>
                            <input type="text" id="title" th:field="*{title}" class="form-control"
                                th:classappend="${#fields.hasErrors('title')} ? ' is-error' : ''"
                                placeholder="タイトルを入力してください（100文字以内）">
                            <p th:if="${#fields.hasErrors('title')}" th:errors="*{title}" class="error-message">エラー</p>
                        </div>

                        <div class="form-group">
                            <label for="category" class="form-label">カテゴリ <span class="required">※</span></label>
                            <select id="category" th:field="*{category}" class="form-control"
                                th:classappend="${#fields.hasErrors('category')} ? ' is-error' : ''">
                                <option value="">-- カテゴリを選択してください --</option>
                                <option th:each="cat : ${categories}" th:value="${cat.name()}"
                                    th:text="${cat.displayName}">カテゴリ</option>
                            </select>
                            <p th:if="${#fields.hasErrors('category')}" th:errors="*{category}" class="error-message">
                                エラー</p>
                        </div>

                        <div class="form-group">
                            <label for="body" class="form-label">本文 <span class="required">※</span></label>
                            <textarea id="body" th:field="*{body}" class="form-control"
                                th:classappend="${#fields.hasErrors('body')} ? ' is-error' : ''" rows="8"
                                placeholder="本文を入力してください（2000文字以内）"></textarea>
                            <p th:if="${#fields.hasErrors('body')}" th:errors="*{body}" class="error-message">エラー</p>
                        </div>

                        <div class="form-actions">
                            <a th:href="@{/posts}" class="btn btn-cancel">キャンセル</a>
                            <button type="submit" class="btn btn-primary">投稿する</button>
                        </div>
                    </form>
                </div>
            </section>
        </th:block>
    </th:block>
</body>

</html>
