version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: communityboard_db
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: communityboard
      MYSQL_USER: cbuser
      MYSQL_PASSWORD: cbpass
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ucbuser", "-pcbpass"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db_data: